<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>

    <div class="summary">
      <div class="card income-card">
        <span class="label">Income</span>
        <span class="amount" id="totalIncome">$0.00</span>
      </div>
      <div class="card balance-card">
        <span class="label">Balance</span>
        <span class="amount" id="balance">$0.00</span>
      </div>
      <div class="card expense-card">
        <span class="label">Expenses</span>
        <span class="amount" id="totalExpense">$0.00</span>
      </div>
    </div>

    <div class="form-section">
      <h3>Add Transaction</h3>
      <div class="form-group">
        <input type="text" id="descInput" placeholder="Description (e.g. Salary, Rent...)" maxlength="60" />
      </div>
      <div class="form-row">
        <input type="number" id="amountInput" placeholder="Amount" step="0.01" min="0" />
        <select id="typeSelect">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <select id="categorySelect">
          <option value="General">General</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Bills">Bills</option>
          <option value="Health">Health</option>
          <option value="Salary">Salary</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <button id="addBtn">Add Transaction</button>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h3>History</h3>
        <button id="clearAllBtn">Clear All</button>
      </div>
      <ul id="transactionList"></ul>
      <p id="emptyMsg">No transactions yet.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
